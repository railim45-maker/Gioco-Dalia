<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Il Regno Incantato di Dalia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Sofia&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow: hidden;
        }
        .magic-title { font-family: 'Sofia', cursive; }
        canvas {
            display: block;
            touch-action: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100 flex justify-center items-center p-0">

    <div class="w-full max-w-md h-screen bg-gradient-to-b from-[#fbf8f3] to-[#f5ebff] overflow-hidden flex flex-col relative sm:shadow-2xl">
        
        <!-- DASHBOARD HOME -->
        <div id="main-dashboard" class="flex-1 flex flex-col overflow-y-auto pb-4">
            <div class="p-4 flex justify-between items-center z-10">
                <div class="bg-white/90 px-4 py-1.5 rounded-full shadow-sm border border-pink-100">
                    <span class="text-sm font-bold text-purple-700">Isola degli Unicorni</span>
                </div>
                <div class="bg-gradient-to-r from-pink-500 to-purple-600 text-white px-4 py-1.5 rounded-full shadow-md font-bold text-sm">
                    💎 <span id="global-points">0</span> Cristalli
                </div>
            </div>

            <div class="px-4 space-y-5 flex-1">
                <div class="text-center">
                    <h1 class="text-3xl font-bold text-purple-900 magic-title">La Valle dell'Arcobaleno</h1>
                </div>

                <!-- MAPPA AVANZAMENTO -->
                <div class="bg-white/95 rounded-2xl p-4 shadow-md border border-purple-100 relative">
                    <div class="h-24 w-full bg-cover bg-center rounded-xl relative overflow-hidden shadow-inner border" style="background-image: url('mappa-arcobaleno.png');">
                        <img id="unicorn-avatar" src="frogMarked.png" alt="Rana Pedina" class="w-12 h-12 absolute top-6 transition-all duration-500 ease-out" style="left: 0%; transform: translateX(-50%);">
                    </div>
                    <div class="flex justify-between items-center mt-2 text-[11px] font-bold text-purple-700">
                        <span id="completion-text">Esplorato: 0%</span>
                        <span id="motivational-quote" class="text-pink-500">Pronta per l'avventura? ✨</span>
                    </div>
                </div>

                <!-- SELEZIONE GIOCHI -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="launchFullscreenGame('froggy')" id="card-btn-froggy" class="bg-white rounded-2xl p-4 shadow-md border-b-4 border-emerald-400 flex flex-col items-center text-center justify-between h-32 active:scale-95 transition-transform">
                        <span class="text-3xl">🐸</span>
                        <div>
                            <h4 class="font-bold text-slate-800 text-xs">Volo di Froggy</h4>
                            <span id="card-timer-froggy" class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-md">15:00</span>
                        </div>
                    </button>

                    <button onclick="launchFullscreenGame('leone')" id="card-btn-leone" class="bg-white rounded-2xl p-4 shadow-md border-b-4 border-amber-400 flex flex-col items-center text-center justify-between h-32 active:scale-95 transition-transform">
                        <span class="text-3xl">🦁</span>
                        <div>
                            <h4 class="font-bold text-slate-800 text-xs">Leone Cacciatore</h4>
                            <span id="card-timer-leone" class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-md">10:00</span>
                        </div>
                    </button>
                </div>

                <!-- AMULETO SOLE -->
                <div class="bg-white rounded-2xl p-4 shadow-md border-b-4 border-sky-400">
                    <h4 class="font-bold text-slate-800 text-xs mb-2">☀️ L'Amuleto del Sole</h4>
                    <div class="py-3 bg-gradient-to-b from-amber-50 to-orange-50 rounded-xl flex flex-col items-center justify-center">
                        <div class="grid grid-cols-6 gap-1.5 mt-1" id="gems-wrapper"></div>
                    </div>
                    <div class="mt-3 grid grid-cols-2 gap-2">
                        <button onclick="addDiurno(15)" class="bg-sky-50 text-sky-700 font-bold text-[10px] py-2 rounded-xl border border-sky-200 active:scale-95 transition-all">➕ Fatti 15 min</button>
                        <button onclick="addDiurno(30)" class="bg-sky-400 hover:bg-sky-500 text-white font-bold text-[10px] py-2 rounded-xl active:scale-95 transition-all">⚡ Fatti 30 min</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SCHERMO DI GIOCO -->
        <div id="fullscreen-game-container" class="absolute inset-0 z-50 hidden flex flex-col">
            <div class="p-3 flex justify-between items-center bg-white/90 backdrop-blur-md border-b shadow-sm z-30">
                <button onclick="exitGame()" class="bg-slate-200 text-slate-700 px-3 py-1 rounded-xl text-xs font-bold active:scale-95">
                    ⬅️ Salva ed Esci
                </button>
                <div id="game-headline-title" class="font-bold text-xs text-slate-800">Volo di Froggy</div>
                <div id="game-live-timer" class="text-xs font-bold px-2.5 py-1 rounded-lg text-white bg-slate-500">15:00</div>
            </div>

            <div class="flex-1 relative w-full h-full" id="canvas-holder-div">
                <canvas id="mainGameCanvas"></canvas>
            </div>
        </div>

    </div>

    <script>
        let state = { points: 0, froggyDone: false, leoneDone: false, diurnoMinutes: 0 };
        let fGame = { total: 900, elapsed: 0, isRunning: false, interval: null };
        let lGame = { total: 600, elapsed: 0, isRunning: false, interval: null };

        let currentActiveMode = null;
        const canvas = document.getElementById('mainGameCanvas');
        const ctx = canvas.getContext('2d');

        // Mappa sorgenti asset
        const rawImages = {};
        const cleanCanvasAssets = {};
        const assetSrcs = {
            frog: 'frogSmiley.png',
            castle: 'castleIsland.png',
            goldFly: 'goldFly_L.png',
            royalFly: 'royalFly_L.png',
            stormCloud: 'stormCloud.png'
        };

        // RIMOZIONE AUTOMATICA DEGLI SCACCHI E RITAGLIO TRASPARENTE
        function makeTransparentAsset(imgKey, imgObj) {
            let tempCanvas = document.createElement('canvas');
            let tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = imgObj.naturalWidth || imgObj.width;
            tempCanvas.height = imgObj.naturalHeight || imgObj.height;

            if (!tempCanvas.width) return;

            tempCtx.drawImage(imgObj, 0, 0);
            let imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            let data = imgData.data;

            // Riconosce e rimuove pixel di grigio/bianco tipici dei finti PNG a scacchi
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i+1], b = data[i+2];
                // Se il pixel è tonalità di grigio/sfondo neutro della griglia, rendilo trasparente
                if ((r > 180 && g > 180 && b > 180 && Math.abs(r - g) < 15 && Math.abs(g - b) < 15) ||
                    (r < 80 && g < 80 && b < 80 && Math.abs(r - g) < 10)) {
                    data[i + 3] = 0; // Alpha = Trasparente
                }
            }
            tempCtx.putImageData(imgData, 0, 0);
            cleanCanvasAssets[imgKey] = tempCanvas;
        }

        Object.keys(assetSrcs).forEach(key => {
            rawImages[key] = new Image();
            rawImages[key].src = assetSrcs[key];
            rawImages[key].onload = () => {
                makeTransparentAsset(key, rawImages[key]);
            };
        });

        // VARIABILI DI GIOCO
        let frogY = 250;
        let frogVelocity = 0;
        let flies = [];
        let obstacles = [];
        let sessionFliesEaten = 0;
        let backgroundScrollX = 0;

        let tongueState = 'idle';
        let tongueTargetFly = null;
        let tongueLen = 0;

        function resizeCanvasToContainer() {
            const holder = document.getElementById('canvas-holder-div');
            if (!holder) return;
            canvas.width = holder.clientWidth;
            canvas.height = holder.clientHeight;
        }

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (currentActiveMode === 'froggy' && fGame.isRunning) {
                frogVelocity = -5.8;
            }
        });

        function globalGameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (currentActiveMode === 'froggy') {
                let currentSpeed = 2.8;

                // Sfondo cielo azzurro continuo
                let skyGrad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                skyGrad.addColorStop(0, '#7dd3fc'); skyGrad.addColorStop(1, '#0284c7');
                ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Disegno Castello di arrivo
                if (cleanCanvasAssets.castle) {
                    ctx.drawImage(cleanCanvasAssets.castle, canvas.width - 110, 20, 90, 90);
                }

                if (fGame.isRunning) {
                    frogVelocity += 0.24;
                    frogY += frogVelocity;
                    if (frogY > canvas.height - 90) { frogY = canvas.height - 90; frogVelocity = 0; }
                    if (frogY < 10) { frogY = 10; frogVelocity = 0; }

                    // Spawn Mosche
                    if (Math.random() < 0.028) {
                        flies.push({ 
                            x: canvas.width, 
                            y: Math.random() * (canvas.height - 180) + 60,
                            isRoyal: Math.random() < 0.18
                        });
                    }

                    // Spawn Nuvola Tempesta (Ostacolo)
                    if (Math.random() < 0.01) {
                        obstacles.push({ x: canvas.width, y: Math.random() * (canvas.height - 160) + 40 });
                    }
                }

                // GESTIONE E DISEGNO MOSCHE
                for (let i = flies.length - 1; i >= 0; i--) {
                    if (fGame.isRunning) flies[i].x -= currentSpeed;

                    let flyAsset = flies[i].isRoyal ? cleanCanvasAssets.royalFly : cleanCanvasAssets.goldFly;

                    if (flyAsset) {
                        // Disegna la mosca pulita orientata a sinistra
                        ctx.save();
                        ctx.scale(-1, 1); // Specchia orizzontalmente se necessario
                        ctx.drawImage(flyAsset, -flies[i].x - 20, flies[i].y - 20, 40, 40);
                        ctx.restore();
                    }

                    // Attivazione lingua
                    let dist = Math.hypot(flies[i].x - 80, flies[i].y - (frogY + 30));
                    if (dist < 120 && tongueState === 'idle' && fGame.isRunning) {
                        tongueState = 'shooting';
                        tongueTargetFly = flies[i];
                    }

                    // Collisione / Cattura
                    if (flies[i].x > 30 && flies[i].x < 110 && flies[i].y > frogY - 10 && flies[i].y < frogY + 70) {
                        sessionFliesEaten++;
                        state.points += flies[i].isRoyal ? 50 : 10;
                        document.getElementById('global-points').innerText = state.points;
                        if (flies[i].isRoyal) confetti({ particleCount: 25, spread: 50, origin: { x: 0.2, y: frogY / canvas.height } });
                        
                        if (tongueTargetFly === flies[i]) { tongueState = 'retracting'; tongueTargetFly = null; }
                        flies.splice(i, 1);
                        continue;
                    }
                    if (flies[i].x < -30) flies.splice(i, 1);
                }

                // LINGUA ELASTICA RANA
                if (tongueState !== 'idle') {
                    let startX = 80, startY = frogY + 35;
                    let targetX = tongueTargetFly ? tongueTargetFly.x : startX;
                    let targetY = tongueTargetFly ? tongueTargetFly.y : startY;

                    if (tongueState === 'shooting') {
                        tongueLen += 0.25; if (tongueLen >= 1) { tongueLen = 1; tongueState = 'retracting'; }
                    } else if (tongueState === 'retracting') {
                        tongueLen -= 0.15; if (tongueLen <= 0) { tongueLen = 0; tongueState = 'idle'; tongueTargetFly = null; }
                    }

                    let curX = startX + (targetX - startX) * tongueLen;
                    let curY = startY + (targetY - startY) * tongueLen;

                    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 4; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(curX, curY); ctx.stroke();
                }

                // DISEGNO NUVOLA TEMPESTA (OSTACOLO)
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    if (fGame.isRunning) obstacles[i].x -= (currentSpeed * 1.1);

                    if (cleanCanvasAssets.stormCloud) {
                        ctx.drawImage(cleanCanvasAssets.stormCloud, obstacles[i].x - 30, obstacles[i].y - 30, 60, 60);
                    }

                    if (obstacles[i].x > 35 && obstacles[i].x < 100 && obstacles[i].y > frogY - 20 && obstacles[i].y < frogY + 60) {
                        obstacles.splice(i, 1);
                        if (sessionFliesEaten > 0) sessionFliesEaten--;
                        if (state.points >= 10) state.points -= 10;
                        document.getElementById('global-points').innerText = state.points;
                        continue;
                    }
                    if (obstacles[i].x < -60) obstacles.splice(i, 1);
                }

                // DISEGNO RANA PERSONAGGIO
                if (cleanCanvasAssets.frog) {
                    ctx.drawImage(cleanCanvasAssets.frog, 35, frogY, 75, 75);
                }

                // TESTO E SCORE
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px Fredoka, sans-serif';
                ctx.fillText(`✨ Insetti Presi: ${sessionFliesEaten}`, 15, 30);
            }

            requestAnimationFrame(globalGameLoop);
        }

        function launchFullscreenGame(mode) {
            currentActiveMode = mode;
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('fullscreen-game-container').classList.remove('hidden');
            resizeCanvasToContainer();

            if (mode === 'froggy') {
                sessionFliesEaten = 0; flies = []; obstacles = []; fGame.isRunning = true;
                fGame.interval = setInterval(() => {
                    fGame.elapsed++;
                    let rem = fGame.total - fGame.elapsed;
                    document.getElementById('game-live-timer').innerText = `${Math.floor(rem/60)}:${rem%60 < 10 ? '0':''}${rem%60}`;
                    if (fGame.elapsed >= fGame.total) { exitGame(); }
                }, 1000);
            }
        }

        function exitGame() {
            fGame.isRunning = false; clearInterval(fGame.interval);
            currentActiveMode = null;
            document.getElementById('fullscreen-game-container').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
        }

        window.addEventListener('resize', resizeCanvasToContainer);
        window.onload = () => { globalGameLoop(); };
    </script>
</body>
</html>
